name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.89.0

jobs:
  quality:
    name: Rust and npm quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy,rustfmt
          rustup default "$RUST_TOOLCHAIN"
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: Run Rust tests
        run: cargo test --locked --all-features
      - name: Build native npm test binary
        run: cargo build --locked --release
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
      - name: Test direct native npm executable
        run: node --test tests/npm_native_cli.mjs
      - name: Validate release manifests
        run: node scripts/prepare-npm-release.mjs --check v0.1.0
      - name: Inspect npm package
        working-directory: npm/steiger-rust
        run: npm pack --dry-run

  native-tests:
    name: Native tests (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-15, windows-2025]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"
      - name: Run tests
        run: cargo test --locked --all-features
