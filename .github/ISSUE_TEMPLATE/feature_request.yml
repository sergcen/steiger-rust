name: Feature request
description: Propose an improvement to Steiger
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this change address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the desired CLI, configuration, rule, or integration behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe existing workarounds or other possible designs.
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility considerations
      description: Note any effect on upstream Steiger parity or existing configurations.
